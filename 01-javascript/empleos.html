<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>DevJobs - Empleos</title>
    <!-- Estilos globales compartidos (fondo, header, variables) -->
    <link rel="stylesheet" href="../00.html-css/style.css">
    <!-- Estilos específicos de la página -->
    <link rel="stylesheet" href="./styles.css">

    <!--Para hacer un llamado de funcione JS es de las siguentes dos formar-->
    <!--Arrow funcion es para ahorrrar codigo, es decir, es lo mismo que decir:-->
    <!--
        const boton= document.querySelector('#boton-importante')
        
        boton.addEventListener('click', function() {
            alert('Gracias por tu interés, Pronto nos pondremos en contacto contigo,')
        })
    -->
    <!--El type module es para que cargue despues que carga HTML, si 
    no, saldra un error porque no encuentra el elemento--><!--
    <script type="module"
        const boton = document.querySelector('#boton-importante')

        boton.addEventListener('click', () => {
            alert('Gracias por tu interés, Pronto nos pondremos en contacto contigo,')
        })
    </script>-->
    <!--Pero para hacerlo bien y mejor es asi -->
    <script type="module" src="./script.js"></script>
    <!--Esta arrow funcion tiene un return implicito-->
</head>

<body>
    <style>
        .ocultar {
            display: none;
        }
    </style>
    <header>
        <!--puede ir el logo la navegacion-->
        <h1>
            <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
            </svg>
            DevJobs
        </h1>

        <nav>
            <a href="index.html">Inicio</a>
            <a href="empleos.html">Empleos</a>
            <a href="empleos2.html">Empresas</a>
            <a href="">Salarios</a>
        </nav>
        <div>
            <a href="" class="btn-subir-cv">Subir CV</a>
            <a href="" class="avatar">👤</a>
        </div>
    </header>
    <main>
        <!-- Hero con búsqueda y filtros -->
        <section class="hero-empleos">
            <h1>Encuentra tu próximo trabajo</h1>
            <p>Explora miles de oportunidades en el sector tecnológico</p>

            <form role="search">
                <div class="search_bar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" placeholder="Buscar trabajos, empresas o habilidades" />
                </div>
            </form>

            <!-- Filtros justo debajo del buscador -->
            <div class="filtros">
                <select name="technology" id="filter-technology">
                    <optgroup label="Tecnología">
                        <option disabled selected class="ocultar">Tecnología</option>
                        <option value="javascript">JavaScript</option>
                        <option value="python">Python</option>
                        <option value="java">Java</option>
                        <option value="react">React</option>
                        <option value="nodejs">Node.js</option>
                    </optgroup>
                    <hr />
                    <option value="c#">C#</option>
                    <hr />
                    <option value="ruby">Ruby</option>
                </select>
                <select name="location" id="filter-location">
                    <option disabled selected class="ocultar">Ubicación</option>
                    <option value="remoto">Remoto</option>
                    <option value="cdmx">Ciudad de México</option>
                    <option value="guadalajara">Guadalajara</option>
                    <option value="monterrey">Monterrey</option>
                    <option value="barcelona">Barcelona</option>
                </select>
                <select name="contract-type" id="filter-contract-type">
                    <option disabled selected class="ocultar">Tipo de contrato</option>
                    <option value="tiempo-completo">Tiempo completo</option>
                    <option value="medio-tiempo">Medio tiempo</option>
                    <option value="por-horas">Por horas</option>
                    <option value="por-proyecto">Por proyecto</option>
                </select>
                <select name="experience-level" id="filter-experience-level">
                    <option disabled selected class="ocultar">Nivel de experiencia</option>
                    <option value="junior">Junior</option>
                    <option value="mid">Mid</option>
                    <option value="senior">Senior</option>
                    <option value="lead">Lead</option>
                </select>
            </div>
        </section>

        <!-- Resultados de búsqueda -->
        <section class="resultados">
            <h2>Resultados de búsqueda</h2>

            <div class="entero">
                <!--aqui se insertan los empleos de forma dinamica con json-->
            </div>
        </section>
        <!-- Paginación -->
        <nav class="paginacion">
            <button>&lt;</button>
            <button class="activo">1</button>
            <button>2</button>
            <button>3</button>
            <button>4</button>
            <button>5</button>
            <button>&gt;</button>
        </nav>
    </main>
    <footer>
        <!--aqui va la parte baja de la pagina-->
        <small>&copy; 2026 DevJobs. Todos los derechos reservados.</small>
    </footer>
</body>

</html>
