<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>DevJobs - Empleos</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <style>
        .ocultar {
            display: none;
        }
    </style>
    <header>
        <!--puede ir el logo la navegacion-->
        <h2>DevJobs</h2>

        <nav>
            <a href="">Inicio</a>
            <a href="">Empleos</a>
        </nav>
        <div>
            <a href="">Publicar un empleo</a>
            <a href="">Iniciar sesión</a>
            <a href=""></a>
            <a href=""></a>
        </div>
    </header>
    <main>
        <section>
            <h1>Encuentra tu próximo trabajo</h1>
            <p>Explora miles de oportunidades en el sector tecnológico</p>


            <form role="search">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>

                <input type="text" placeholder="Buscar trabajos, empresas o habilidades" />

                <button type="submit">Buscar</button>
            </form>


            <section>

                <select>
                    <option disabled selected class="ocultar">Tecnología</option>
                </select>
                <select>
                    <option disabled selected class="ocultar">Ubicación</option>
                </select>
                <select>
                    <option disabled selected class="ocultar">Tipo de contrato</option>
                </select>
                <select>
                    <option disabled selected class="ocultar">Nivel de experiencia</option>
                </select>

            </section>
    </main>
</body>

</html>
